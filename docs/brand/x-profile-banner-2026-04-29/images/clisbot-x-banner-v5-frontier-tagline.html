<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --cyan: #5af7ff;
        --teal: #14c8cf;
        --ink: #e6fbff;
        --muted: rgba(223, 251, 255, 0.66);
      }

      html,
      body {
        margin: 0;
        width: 1500px;
        height: 500px;
        overflow: hidden;
        background: #02090d;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .banner {
        position: relative;
        width: 1500px;
        height: 500px;
        background:
          linear-gradient(90deg, rgba(2, 9, 13, 0.54) 0%, rgba(2, 9, 13, 0.18) 38%, rgba(2, 9, 13, 0) 100%),
          url("./clisbot-x-banner-v3-professional-1500x500.png") center / cover no-repeat;
      }

      .tagline {
        position: absolute;
        left: 96px;
        top: 82px;
        display: grid;
        gap: 17px;
      }

      .prompt {
        display: inline-flex;
        width: max-content;
        align-items: center;
        gap: 12px;
        color: var(--cyan);
        font-size: 26px;
        font-weight: 800;
        line-height: 1;
        text-shadow: 0 0 20px rgba(90, 247, 255, 0.45);
      }

      .prompt::after {
        content: "";
        width: 22px;
        height: 3px;
        border-radius: 999px;
        background: var(--cyan);
        box-shadow: 0 0 18px rgba(90, 247, 255, 0.65);
      }

      h1 {
        margin: 0;
        max-width: 560px;
        color: var(--ink);
        font-size: 58px;
        font-weight: 780;
        line-height: 0.98;
        letter-spacing: 0;
        text-wrap: balance;
        text-shadow:
          0 0 28px rgba(90, 247, 255, 0.22),
          0 8px 30px rgba(0, 0, 0, 0.62);
      }

      .rule {
        width: 248px;
        height: 2px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--cyan), rgba(20, 200, 207, 0.12));
        box-shadow: 0 0 20px rgba(20, 200, 207, 0.5);
      }

      .micro {
        color: var(--muted);
        font-size: 19px;
        font-weight: 650;
        letter-spacing: 0;
      }
    </style>
  </head>
  <body>
    <main class="banner" aria-label="clisbot X banner">
      <section class="tagline">
        <div class="prompt">&gt;_</div>
        <h1>Frontier AI CLIs<br />as chat agents</h1>
        <div class="rule"></div>
        <div class="micro">Codex · Claude · Gemini · Slack · Telegram</div>
      </section>
    </main>
  </body>
</html>
